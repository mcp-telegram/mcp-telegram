name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)publish, e.g. v1.38.0. Leave blank to use the dispatched ref."
        required: false
        type: string

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npx biome check src/
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Publish to npm
        run: |
          npm publish --access public 2> publish-err.log && exit 0
          if grep -q "cannot publish over" publish-err.log; then
            echo "Version already published — skipping (idempotent re-run)."
            exit 0
          fi
          echo "::error::npm publish failed for a reason other than 'already published':"
          cat publish-err.log
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

  publish-binaries:
    # Runs for both `release: published` and a manual `workflow_dispatch` on a tag.
    # release-please creates the GitHub Release with the default GITHUB_TOKEN, which
    # does NOT trigger the `release` event (loop-protection) — so real releases are
    # published via `workflow_dispatch --ref vX.Y.Z`. Gating on `event_name == 'release'`
    # silently skipped binaries for every release-please tag (v1.37.1, v1.38.0 shipped
    # with 0 assets). Skip only if no tag can be resolved (e.g. dispatch on a branch).
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            server: mcp-telegram-linux-x64
            login: mcp-telegram-login-linux-x64
          - target: bun-linux-arm64
            server: mcp-telegram-linux-arm64
            login: mcp-telegram-login-linux-arm64
          - target: bun-darwin-x64
            server: mcp-telegram-darwin-x64
            login: mcp-telegram-login-darwin-x64
          - target: bun-darwin-arm64
            server: mcp-telegram-darwin-arm64
            login: mcp-telegram-login-darwin-arm64
          - target: bun-windows-x64
            server: mcp-telegram-windows-x64.exe
            login: mcp-telegram-login-windows-x64.exe
    steps:
      # When re-publishing a past tag via the `tag` input, check out that tag's
      # source so the compiled binaries match the released code (not main's HEAD).
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      # Resolve the release tag from any trigger: the explicit `tag` input, the
      # `release` event payload, or the ref a manual dispatch was launched on.
      # Skip the upload if none yields a vX.Y.Z tag (e.g. dispatch on `main`).
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "No release tag resolved (no tag input, not a release event, not a tag ref) — skipping binary upload."
            echo "name=" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        if: steps.tag.outputs.name != ''
        with:
          bun-version: "1.3.13"

      # Compile-only job — no registry publish. Tolerate lockfile drift so a
      # patch bump to package.json doesn't block standalone binary publishing
      # while bun.lock catches up. Dependency tree is already validated by
      # publish-npm above (npm ci + package-lock.json).
      - if: steps.tag.outputs.name != ''
        run: bun install

      - name: Compile MCP server binary
        if: steps.tag.outputs.name != ''
        run: bun build src/index.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.server }}

      - name: Compile login CLI binary
        if: steps.tag.outputs.name != ''
        run: bun build src/qr-login-cli.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.login }}

      - name: Upload binaries to release
        if: steps.tag.outputs.name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.tag.outputs.name }} ${{ matrix.server }} --clobber
          gh release upload ${{ steps.tag.outputs.name }} ${{ matrix.login }} --clobber
