name: Release Please

# Maintains a rolling "Release PR" from Conventional Commits on main.
# Merge that PR → release-please creates the git tag + GitHub Release,
# which triggers publish.yml (on: release: published) to publish npm,
# Docker, and standalone binaries. No manual version bump or changelog.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # release-please-action@v4 still bundles a Node 20 runtime (deprecated on
    # GitHub runners from 2026-06-16). Opt into Node 24 ahead of the forced cutover.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
