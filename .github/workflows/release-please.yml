name: Release Please

# Maintains a rolling "Release PR" from Conventional Commits on main.
# Merge that PR → release-please creates the git tag + GitHub Release,
# which triggers publish.yml (on: release: published) to publish npm,
# Docker, and standalone binaries. No manual version bump or changelog.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # v5's only breaking change vs v4 is the bundled runtime (Node 20 → 24),
      # so the old FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opt-in is no longer needed.
      # Config schema, inputs, and behavior are unchanged.
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
